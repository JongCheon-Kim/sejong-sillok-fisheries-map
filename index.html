<style>
:root{--ink:#27332c;--brown:#845638;--paper:#fffdfa;--cream:#f2eadf;--line:#d9cbb8;--muted:#746c62;--panel-font:16px}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#e7dfd2;color:var(--ink)}
#map{width:100%;height:100%}
.leaflet-div-icon{background:transparent;border:0}
.character-marker{position:relative;width:92px;height:100px;filter:drop-shadow(0 5px 5px rgba(0,0,0,.28));transition:.18s}
.character-marker:hover{transform:scale(1.08)}
.character-marker svg{position:absolute;left:16px;top:0;width:60px;height:72px}
.character-label{position:absolute;left:0;bottom:0;width:92px;background:rgba(255,253,248,.97);border:2px solid #77563c;border-radius:10px;padding:4px 5px;text-align:center;line-height:1.1;white-space:nowrap}
.character-label b{display:block;font-size:13px;color:#473729}
.character-label span{font-size:11px;color:#6d6259}
.character-marker.dim{opacity:.35;filter:grayscale(.85);transform:scale(.9)}
.character-marker.hit{transform:scale(1.22);filter:drop-shadow(0 0 13px #d49a1f);z-index:10}
.character-marker.hit .character-label{border-width:3px;background:#fff8df;box-shadow:0 0 0 4px rgba(227,169,39,.2)}
.province-hover{min-width:210px;font-family:'Noto Sans KR','Malgun Gothic',sans-serif}
.province-hover h3{margin:0 0 7px;font-size:17px;color:#473729}
.hover-total{font-size:12px;color:#6d6259;margin-bottom:7px}
.hover-row{display:grid;grid-template-columns:72px 1fr 28px;gap:6px;align-items:center;margin:5px 0;font-size:12px}
.hover-track{height:8px;background:#ece3d7;border-radius:999px;overflow:hidden}
.hover-fill{height:100%;background:#845638;border-radius:999px}
.hover-hint{margin-top:8px;padding-top:7px;border-top:1px solid #e5d8c7;font-size:11px;color:#765f49;text-align:center}

.panel{position:fixed;z-index:2000;right:16px;top:16px;width:540px;height:calc(100vh - 32px);min-width:390px;min-height:420px;max-width:94vw;max-height:96vh;background:var(--paper);border:1px solid #a99172;border-radius:18px;box-shadow:0 14px 42px rgba(0,0,0,.34);display:flex;flex-direction:column;resize:both;overflow:hidden;font-size:var(--panel-font)}
.panel.hidden-panel{display:none}
/* v10.4: 선택창과 결과창을 2단계로 분리 */
.panel.selection-mode .panel-main{display:none}
.panel.result-mode .header-content,
.panel.result-mode .filter-funnel,
.panel.result-mode .crumbs,
.panel.result-mode .tabs{display:none}
.panel.result-mode .panel-top{border-bottom:0}
.panel.result-mode .dragbar-title::after{content:" · 결과 보기";color:#7a5b3f}
.panel.result-mode .panel-main{display:flex;flex:1 1 auto;min-height:0}
.panel.minimized{height:76px!important;min-height:76px;resize:none}
.panel.minimized .panel-main{display:none}
.panel-top{flex:0 0 auto;background:linear-gradient(135deg,#faf7f0,#eadbc5);border-bottom:1px solid var(--line)}
.dragbar{height:30px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;cursor:move;background:#e7dac8;border-bottom:1px solid #cfbea8;user-select:none}
.dragbar-title{font-size:13px;font-weight:900;color:#66492f}
.window-actions{display:flex;gap:5px}
.window-btn{border:1px solid #b09d83;background:#fff;border-radius:7px;padding:3px 8px;cursor:pointer;font-weight:800}
.window-btn.close-btn{font-size:18px;line-height:1;padding:2px 8px;color:#7a3729}
.header-content{padding:12px 16px 10px}
.header-content h1{font-family:'Noto Serif KR',serif;font-size:clamp(21px,2.1vw,31px);margin:0 0 3px;letter-spacing:-.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-content p{margin:0;color:#665d53;font-size:13px}

.filter-funnel{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 11px}
.field{min-width:0}
.field label{display:block;font-size:12px;font-weight:900;color:#6e5843;margin:0 0 3px}
.control{width:100%;border:1px solid #bba78b;background:#fff;border-radius:9px;padding:9px 10px;font-size:14px}
.control:disabled{background:#eee9e1;color:#9b9185}
.item-picker{grid-column:1/-1;position:relative}
.item-input-wrap{position:relative}
.item-input-wrap:after{content:"▾";position:absolute;right:11px;top:9px;color:#70563e;pointer-events:none}
.autocomplete{display:none;position:absolute;z-index:3000;left:0;right:0;top:100%;margin-top:4px;max-height:300px;overflow-y:auto;background:#fff;border:1px solid #a99172;border-radius:10px;box-shadow:0 10px 24px rgba(0,0,0,.23)}
.autocomplete.open{display:block}
.auto-item{padding:9px 11px;border-bottom:1px solid #eee5d8;cursor:pointer}
.auto-item:last-child{border-bottom:0}
.auto-item:hover,.auto-item.active{background:#f1e7d8}
.auto-name{font-weight:900;font-size:15px}
.auto-meta{font-size:12px;color:#776d63;margin-top:2px}

.crumbs{padding:8px 16px;background:#f4ede3;border-top:1px solid #e0d4c4;border-bottom:1px solid #d8c8b3;font-size:13px;line-height:1.45}
.crumbs b{color:#71482e}
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:9px 13px;background:#fffdfa;border-bottom:1px solid var(--line)}
.tab{border:1px solid #c5b499;background:#fff;border-radius:999px;padding:7px 10px;cursor:pointer;font-weight:800;font-size:13px}
.tab.active{background:var(--brown);border-color:var(--brown);color:#fff}
.panel-main{display:flex;flex-direction:column;flex:1 1 auto;min-height:0}
.content{flex:1 1 auto;overflow-y:auto;padding:14px 16px 28px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px}
.stat{background:#f1e9dd;border:1px solid #ddcfbb;border-radius:10px;padding:9px;text-align:center}
.stat b{display:block;font-size:23px}.stat span{font-size:11px;color:#746b61}
.section-title{font-size:20px;font-weight:900;margin:16px 0 9px;display:flex;align-items:center;gap:7px}
.section-title:before{content:"";width:5px;height:21px;background:var(--brown);border-radius:3px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.card{border:1px solid #dacbb7;background:#fff;border-radius:10px;padding:10px;cursor:pointer}
.card:hover{box-shadow:0 5px 13px rgba(0,0,0,.1);transform:translateY(-1px)}
.card-name{font-weight:900;font-size:16px;line-height:1.4}
.card-meta{font-size:12px;color:#746b61;margin-top:4px}
.badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.badge{font-size:10px;padding:3px 6px;border-radius:999px;background:#eee6da}
.badge.ok{background:#dcefe1;color:#285d37}.badge.warn{background:#fff0c9;color:#805c00}.badge.danger{background:#f6dede;color:#8a3030}
.detail{display:none;margin-top:8px;padding:10px;background:#f7f1e8;border-radius:8px;line-height:1.6;font-size:13px}
.detail.open{display:block}
.chart-card{border:1px solid var(--line);background:#fcfaf6;border-radius:12px;padding:12px;margin-bottom:13px}
.chart-wrap{height:270px}
.method-card{border:1px solid var(--line);background:#fcfaf6;border-radius:12px;padding:14px;margin-bottom:12px;line-height:1.65}
.empty{padding:25px;text-align:center;color:#776e65}
body.font-small{--panel-font:14px}body.font-large{--panel-font:19px}
body.font-large .card-name{font-size:19px}body.font-large .section-title{font-size:23px}

.item-clear{position:absolute;right:28px;top:7px;border:0;background:transparent;font-size:20px;line-height:1;cursor:pointer;color:#8a5c3b;display:none}
.item-clear.show{display:block}
.badge[title]{cursor:help}
.card.selected{outline:2px solid #9a6a42;background:#fffaf2}

@media(max-width:820px){
 .panel{left:5px!important;right:5px!important;top:5px!important;width:auto!important;height:calc(100vh - 10px)!important;min-width:0;resize:none}
 .filter-funnel{grid-template-columns:1fr 1fr}
 .cards{grid-template-columns:1fr}
 .stats{grid-template-columns:1fr 1fr}
 .dragbar{cursor:default}
}

.install-btn{position:fixed;z-index:2500;left:14px;bottom:14px;border:1px solid #6f4a31;background:#845638;color:#fff;border-radius:999px;padding:10px 15px;font-weight:900;box-shadow:0 6px 18px rgba(0,0,0,.25);cursor:pointer;display:none}
.install-btn.show{display:block}
@media(max-width:820px){.install-btn{left:12px;bottom:12px}}

</style>
</head>

const el=id=>document.getElementById(id);
function unique(arr){return [...new Set(arr.filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'))}
function statusClass(s){return s==='확정'?'ok':s==='유력'?'warn':'danger'}
function baseRows(){

 const p=DATA.provinces.find(x=>x.name===state.region);
 return (p?.items||[]).map(i=>({...i,provinces:[state.region]}));

function filterBeforeItem(){

   (state.subcategory==='전체'||(i.subcategory||i.category)===state.subcategory)&&
   (state.season==='전체'||(state.season==='미확정'?i.season==='미확정':(i.season||'').includes(state.season)))
 );
}

function makeOptions(select,values,current,label){
 select.innerHTML=`<option value="전체">${label}</option>`+values.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
 select.value=values.includes(current)?current:'전체';
}
function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function initControls(){

}
function syncControlsFromState(){el('region').value=state.region}
function cascadeUpdate(){
 let rows=baseRows();
 const categories=unique(rows.map(i=>i.category));
 if(state.category!=='전체'&&!categories.includes(state.category)) state.category='전체';
 makeOptions(el('category'),categories,state.category,'전체 대분류');

 rows=rows.filter(i=>state.category==='전체'||i.category===state.category);
 const subcats=unique(rows.map(i=>i.subcategory||i.category));
 if(state.subcategory!=='전체'&&!subcats.includes(state.subcategory)) state.subcategory='전체';
 makeOptions(el('subcategory'),subcats,state.subcategory,'전체 세부분류');

 rows=rows.filter(i=>state.subcategory==='전체'||(i.subcategory||i.category)===state.subcategory);
 const seasons=unique(rows.map(i=>i.season||'미확정'));
 if(state.season!=='전체'&&!seasons.some(s=>s.includes(state.season))) state.season='전체';
 makeOptions(el('season'),seasons,state.season,'전체 계절·어기');

 const available=filterBeforeItem();
 if(state.itemKey&&!available.some(i=>i.key===state.itemKey)) state.itemKey=null;
 const selected=state.itemKey?nationalRowFor(state.itemKey):null;
 el('itemInput').value=selected?selected.display:'';
 el('itemClear').classList.toggle('show',!!selected);
 updateCrumbs();
 updateAutocomplete('');
 updateMarkers(selectedRows());
 render();
}
function updateCrumbs(){
 const parts=[state.region];
 if(state.category!=='전체')parts.push(state.category);
 if(state.subcategory!=='전체')parts.push(state.subcategory);
 if(state.season!=='전체')parts.push(state.season);
 if(state.itemKey)parts.push(nationalRowFor(state.itemKey)?.modern||nationalRowFor(state.itemKey)?.original);
 el('crumbs').innerHTML='<b>현재 선택:</b> '+parts.map(escapeHtml).join(' 〉 ');
}
function updateAutocomplete(query){
 const q=(query||'').trim().toLowerCase();
 let rows=filterBeforeItem();
 const seen=new Set();rows=rows.filter(i=>!seen.has(i.key)&&seen.add(i.key));
 if(q) rows=rows.filter(i=>`${i.display} ${i.modern} ${i.original} ${i.hanja}`.toLowerCase().includes(q));
 rows.sort((a,b)=>(a.modern||a.original).localeCompare(b.modern||b.original,'ko'));
 el('autocomplete').innerHTML=rows.map(i=>`<div class="auto-item" data-key="${escapeHtml(i.key)}"><div class="auto-name">${ICONS[i.category]||'•'} ${escapeHtml(i.display)}</div><div class="auto-meta">${escapeHtml(i.category)} · 전국 ${i.frequency}도 출현</div></div>`).join('')||'<div class="empty">조건에 맞는 품목이 없습니다.</div>';
 el('autocomplete').querySelectorAll('.auto-item').forEach(n=>n.onclick=()=>{state.itemKey=n.dataset.key;el('autocomplete').classList.remove('open');cascadeUpdate();});
}
function updateMarkers(rows){
 const itemProvinces=new Set();
 if(state.itemKey)(nationalRowFor(state.itemKey)?.provinces||[]).forEach(p=>itemProvinces.add(p));
 Object.entries(markerMap).forEach(([p,m])=>{
   const node=m.getElement()?.querySelector('.character-marker');if(!node)return;
   node.classList.remove('dim','hit');
   if(state.itemKey){
     node.classList.add(itemProvinces.has(p)?'hit':'dim');
   }else if(state.region!=='전국'&&p===state.region){
     node.classList.add('hit');
   }
 });
}
function statsFor(rows){
 const keys=new Set(rows.map(i=>i.key));
 const provinces=new Set();
 rows.forEach(i=>(i.provinces||[]).forEach(p=>provinces.add(p)));
 return {
  itemCount:keys.size,
  provinceCount:provinces.size,
  recordCount:rows.reduce((s,i)=>s+(i.provinces?.length||1),0),
  seasonCount:new Set(rows.filter(i=>i.season&&i.season!=='미확정').map(i=>i.key)).size
 };
}
function statsHtml(rows){
 const s=statsFor(rows);
 return `<div class="stats"><div class="stat"><b>${s.itemCount}</b><span>선택 품목</span></div><div class="stat"><b>${s.provinceCount}</b><span>출현 지역</span></div><div class="stat"><b>${s.recordCount}</b><span>지역 기록</span></div><div class="stat"><b>${s.seasonCount}</b><span>계절 확인</span></div></div>`;
}

   <b>현재 선택 기준:</b> ${escapeHtml(scope)}<br>
   <b>원문명:</b> ${escapeHtml(i.original)} ${i.hanja?'('+escapeHtml(i.hanja)+')':''}<br>
   <b>현대 대응명:</b> ${escapeHtml(i.modern||'미확정')}<br>
   <b>세부분류:</b> ${escapeHtml(i.subcategory||i.category)}<br>
   <b>전국 출현 지역:</b> ${escapeHtml((nat.provinces||[]).join(', '))}<br>
   <b>계절·어기:</b> ${escapeHtml(i.season)} (${escapeHtml(i.seasonLevel)})<br>
   <b>근거:</b> ${escapeHtml(i.seasonEvidence||'직접 근거 미확보')}
  </div>
 </div>`;
}
function listHtml(rows,title){
 if(!rows.length)return statsHtml(rows)+'<div class="empty">현재 선택 조건에 해당하는 품목이 없습니다.</div>';
 const groups={};rows.forEach(i=>(groups[i.category]??=[]).push(i));
 let n=0;
 return statsHtml(rows)+`<div class="section-title">${title}</div>`+Object.entries(groups).map(([g,a])=>`<h3>${ICONS[g]||'•'} ${g} (${a.length})</h3><div class="cards">${a.map(i=>card(i,n++)).join('')}</div>`).join('');
}
function renderCharts(rows){
 el('content').innerHTML=statsHtml(rows)+`<div class="chart-card"><div class="section-title">8도별 선택 품목 수</div><div class="chart-wrap"><canvas id="barChart"></canvas></div></div><div class="chart-card"><div class="section-title">분류별 구성</div><div class="chart-wrap"><canvas id="donutChart"></canvas></div></div><div class="chart-card"><div class="section-title">계절·어기 분포</div><div class="chart-wrap"><canvas id="seasonChart"></canvas></div></div>`;
 const provCounts=Object.fromEntries(DATA.provinces.map(p=>[p.name,0]));
 const categoryCounts={},seasonCounts={};
 rows.forEach(i=>{(i.provinces||[]).forEach(p=>provCounts[p]++);categoryCounts[i.category]=(categoryCounts[i.category]||0)+1;const s=i.season||'미확정';seasonCounts[s]=(seasonCounts[s]||0)+1;});
 if(bar)bar.destroy();if(donut)donut.destroy();if(seasonChart)seasonChart.destroy();
 bar=new Chart(el('barChart'),{type:'bar',data:{labels:Object.keys(provCounts),datasets:[{data:Object.values(provCounts),backgroundColor:'#6b806e',borderRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
 donut=new Chart(el('donutChart'),{type:'doughnut',data:{labels:Object.keys(categoryCounts),datasets:[{data:Object.values(categoryCounts),backgroundColor:Object.keys(categoryCounts).map(x=>COLORS[x]),borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}});
 seasonChart=new Chart(el('seasonChart'),{type:'bar',data:{labels:Object.keys(seasonCounts),datasets:[{data:Object.values(seasonCounts),backgroundColor:'#b2764d',borderRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
}
function render(){
 let rows=selectedRows();
 if(state.tab==='unique') rows=rows.filter(i=>(nationalRowFor(i.key)?.frequency||0)===1);
 if(state.tab==='common') rows=rows.filter(i=>(nationalRowFor(i.key)?.frequency||0)>=4);
 if(state.tab==='season') rows=rows.filter(i=>i.season&&i.season!=='미확정');
 if(state.tab==='stats')return renderCharts(rows);
 if(state.tab==='method'){el('content').innerHTML=`<div class="method-card"><h3>자료의 중심</h3><p>박구병 저 『한국어업사』의 『세종실록지리지』 8도 수산물 목록을 중심으로 구축했습니다.</p></div><div class="method-card"><h3>교차 판독</h3><p>『해제로 보는 조선시대 생물자원 1』, 『조선왕조실록상의 수산업』 등을 대조하여 한자·현대명·계절·어기·고증 상태를 구분했습니다.</p></div><div class="method-card"><h3>사용법</h3><p>지역에서 품목으로 단계적으로 좁히거나, 품목 선택창을 클릭해 목록에서 바로 고를 수 있습니다. 모든 선택은 지도·숫자·그래프에 즉시 반영됩니다.</p></div>`;return;}
 const labels={items:'현재 조건의 품목',unique:'지역 고유 품목',common:'4도 이상 전국 공통 품목',season:'계절·어기 확인 품목'};
 el('content').innerHTML=listHtml(rows,labels[state.tab]||'품목 목록');
}
el('region').onchange=e=>{state.region=e.target.value;state.category='전체';state.subcategory='전체';state.season='전체';state.itemKey=null;cascadeUpdate();el('panel').classList.remove('hidden-panel');showSelectionView()};
el('category').onchange=e=>{state.category=e.target.value;state.subcategory='전체';state.season='전체';state.itemKey=null;cascadeUpdate()};
el('subcategory').onchange=e=>{state.subcategory=e.target.value;state.season='전체';state.itemKey=null;cascadeUpdate()};
el('season').onchange=e=>{state.season=e.target.value;state.itemKey=null;cascadeUpdate()};
el('itemInput').onfocus=()=>{updateAutocomplete(el('itemInput').value);el('autocomplete').classList.add('open')};
el('itemInput').onmouseenter=()=>{updateAutocomplete(el('itemInput').value);el('autocomplete').classList.add('open')};
el('itemInput').oninput=e=>{state.itemKey=null;updateAutocomplete(e.target.value);el('autocomplete').classList.add('open')};
el('itemClear').onclick=e=>{e.stopPropagation();state.itemKey=null;el('itemInput').value='';el('autocomplete').classList.remove('open');cascadeUpdate()};
document.addEventListener('click',e=>{if(!e.target.closest('.item-picker'))el('autocomplete').classList.remove('open')});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showResultView(t.dataset.tab));
function setFont(size){document.body.classList.remove('font-small','font-large');if(size==='small')document.body.classList.add('font-small');if(size==='large')document.body.classList.add('font-large')}
el('minBtn').onclick=()=>{el('panel').classList.toggle('minimized');el('minBtn').textContent=el('panel').classList.contains('minimized')?'□':'—'};
el('closeBtn').onclick=()=>{if(el('panel').classList.contains('result-mode'))showSelectionView();else closePanelToMap()};
// Desktop drag
(()=>{const panel=el('panel'),bar=el('dragbar');let dragging=false,dx=0,dy=0;
 bar.addEventListener('mousedown',e=>{if(e.target.closest('button')||innerWidth<=820)return;dragging=true;const r=panel.getBoundingClientRect();dx=e.clientX-r.left;dy=e.clientY-r.top;panel.style.right='auto';e.preventDefault()});
 document.addEventListener('mousemove',e=>{if(!dragging)return;panel.style.left=Math.max(0,Math.min(innerWidth-panel.offsetWidth,e.clientX-dx))+'px';panel.style.top=Math.max(0,Math.min(innerHeight-panel.offsetHeight,e.clientY-dy))+'px'});
 document.addEventListener('mouseup',()=>dragging=false);
})();
initControls();
</script>
<script src="app.js"></script>
</body>
</html>
